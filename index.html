<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF Annual Strategy Playbook</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary-green: #10b981;
            --primary-red: #ef4444;
            --accent-blue: #3b82f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #334155;
            padding-bottom: 20px;
        }

        h1 { margin-bottom: 5px; color: var(--text-main); }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; }

        /* Stats Grid */
        .stats-banner {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #334155;
        }

        .stat-val { font-size: 1.8rem; font-weight: bold; margin-top: 5px; }
        .stat-val.up { color: var(--primary-green); }
        .stat-val.down { color: var(--primary-red); }

        /* Playbook Grid */
        .playbook-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .month-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .month-title { font-size: 1.25rem; font-weight: bold; color: var(--accent-blue); }
        .historical-tag { font-size: 0.75rem; color: var(--text-muted); background: #0f172a; padding: 3px 8px; border-radius: 12px; }

        .action-row {
            display: flex;
            align-items: center;
            background: #0f172a;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .action-row:hover { transform: translateX(3px); }

        .checkbox-container {
            position: relative;
            margin-right: 12px;
            display: flex;
            align-items: center;
        }

        .checkbox-container input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent-blue);
        }

        .badge {
            font-size: 0.75rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 10px;
            text-transform: uppercase;
        }

        .badge.buy { background-color: rgba(16, 185, 129, 0.2); color: var(--primary-green); }
        .badge.sell { background-color: rgba(239, 68, 68, 0.2); color: var(--primary-red); }

        .action-text { font-size: 0.9rem; flex-grow: 1; }
        
        /* Tracker Footer Counters */
        .counter-box {
            margin-top: 35px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--accent-blue);
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
        }
        .counter-item { text-align: center; margin: 10px; }
        .counter-num { font-size: 2rem; font-weight: bold; color: var(--accent-blue); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>ETF Annual Trading Playbook</h1>
        <p class="subtitle">Interactive checklist modeled from 5-Year historical trends (2021-2025)</p>
    </header>

    <div class="stats-banner">
        <div class="stat-card">
            <div>Avg Annual Trading Days</div>
            <div class="stat-val">~252 Days</div>
        </div>
        <div class="stat-card">
            <div>Historical Market Bias</div>
            <div class="stat-val up">54.4% Up Days</div>
        </div>
        <div class="stat-card">
            <div>Avg Green Days / Year</div>
            <div class="stat-val up">~137 Days</div>
        </div>
        <div class="stat-card">
            <div>Avg Red Days / Year</div>
            <div class="stat-val down">~115 Days</div>
        </div>
    </div>

    <div class="playbook-grid" id="playbook"></div>

    <div class="counter-box">
        <div class="counter-item">
            <div>Total Playbook Steps Executed</div>
            <div class="counter-num" id="total-count">0 / 24</div>
        </div>
    </div>
</div>

<script>
    // Playbook definitions tracking general seasonal ETF historical traits
    const playbookData = [
        { month: "January", bias: "Up", buy: "Deploy new capital (Jan Effect)", sell: "Trim asset classes that over-performed in Q4" },
        { month: "February", bias: "Down", buy: "Accumulate on mid-month weakness", sell: "Hedge dynamic gains before options expiration" },
        { month: "March", bias: "Up", buy: "Reinvest dividends from quarter-end", sell: "Take profit on speculative runs before rebalancing" },
        { month: "April", bias: "Up", buy: "Buy leading index/sector ETFs early", sell: "Sell laggards post tax-day liquidity drain" },
        { month: "May", bias: "Down", buy: "Value/Dividend ETF defensive plays", sell: "Reduce high-beta exposure (Sell in May)" },
        { month: "June", bias: "Neutral", buy: "Dollar cost average during tech reshuffles", sell: "Harvest small-cap profits near mid-year close" },
        { month: "July", bias: "Up", buy: "Front-run positive earnings revisions", sell: "Scale back extended thematic growth ETFs" },
        { month: "August", bias: "Down", buy: "Buy long-dated targets on low volume dips", sell: "Liquidate low liquidity tactical positions" },
        { month: "September", bias: "Down", buy: "Aggressive entry point window (Historically Weak)", sell: "Execute risk-off asset conversions" },
        { month: "October", bias: "Up", buy: "Accumulate at post-capitulation structural lows", sell: "Trim positions failing to push above 200-MA" },
        { month: "November", bias: "Up", buy: "Ride momentum tracks; Year-end inflows", sell: "Exit underperforming thematic structural plays" },
        { month: "December", bias: "Up", buy: "Add to tax-loss harvested assets", sell: "Lock in Santa Claus rally high profits" }
    ];

    const gridEl = document.getElementById('playbook');

    playbookData.forEach((data, index) => {
        const card = document.createElement('div');
        card.className = 'month-card';
        card.innerHTML = `
            <div class="month-header">
                <div class="month-title">${data.month}</div>
                <div class="historical-tag">Bias: ${data.bias}</div>
            </div>
            
            <label class="action-row">
                <div class="checkbox-container">
                    <input type="checkbox" class="playbook-cb" data-id="${index}-buy">
                </div>
                <span class="badge buy">Buy</span>
                <div class="action-text">${data.buy}</div>
            </label>

            <label class="action-row">
                <div class="checkbox-container">
                    <input type="checkbox" class="playbook-cb" data-id="${index}-sell">
                </div>
                <span class="badge sell">Sell</span>
                <div class="action-text">${data.sell}</div>
            </label>
        `;
        gridEl.appendChild(card);
    });

    // Score Counter Engine
    const checkboxes = document.querySelectorAll('.playbook-cb');
    const totalCountEl = document.getElementById('total-count');

    function updateScore() {
        const checkedCount = document.querySelectorAll('.playbook-cb:checked').length;
        totalCountEl.innerText = `${checkedCount} / ${checkboxes.length}`;
    }

    checkboxes.forEach(cb => {
        cb.addEventListener('change', updateScore);
    });
</script>

</body>
</html>
